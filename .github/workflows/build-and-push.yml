name: CI - Build and Push to ACR

# SPEŁNIENIE WARUNKU: Brak push/pr, aktywacja wyłącznie ręczna z GUI
on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry (ACR)
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ github.run_number }}
          REGISTRY_URL=${{ secrets.ACR_NAME }}.azurecr.io
          IMAGE_NAME="traffic-guard-app"
          
          # Budowanie obrazu z dwoma tagami: numer uruchomienia oraz 'latest'
          docker build -t $REGISTRY_URL/$IMAGE_NAME:$IMAGE_TAG -t $REGISTRY_URL/$IMAGE_NAME:latest .
          
          # Wypchnięcie obrazów do Azure
          docker push $REGISTRY_URL/$IMAGE_NAME:$IMAGE_TAG
          docker push $REGISTRY_URL/$IMAGE_NAME:latest